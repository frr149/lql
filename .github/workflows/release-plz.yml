name: Release PLZ

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main
  # Manual escape hatch: if a push to main fails to spin up the release-plz
  # job (rare but happens — e.g. PR-merge → push events that don't propagate
  # to Actions for whatever reason), run `gh workflow run "Release PLZ"` to
  # nudge it.
  workflow_dispatch:

jobs:
  release-plz:
    name: Release PLZ
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@v0.5
        # No `command:` → runs both `release` (tags any merged version bump)
        # and `release-pr` (opens/updates the next release PR). Previously only
        # `release-pr` ran, so tags were never created and releases stalled.
        env:
          # Must be a PAT, not the default GITHUB_TOKEN: a tag pushed with
          # GITHUB_TOKEN does not trigger other workflows, so cargo-dist's
          # release.yml would never fire. The PAT lets the tag push trigger
          # the cross-platform binary release.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Notify Telegram
        if: steps.release-plz.outputs.prs_created == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          PR_URL=$(echo '${{ steps.release-plz.outputs.prs }}' | jq -r '.[0].html_url // "https://github.com/frr149/lql/pulls"')
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=Markdown \
            -d text="🦀 *lql* release PR ready to merge: ${PR_URL}"
