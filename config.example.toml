# lql configuration. Copy to ~/.config/lql/config.toml and customize.
# This file is OPTIONAL: if LINEAR_API_KEY is exported, lql works with no config at all.

# -- Authentication -----------------------------------------------------------
# Pick ONE of the methods below (or set LINEAR_API_KEY and delete this section).
# Resolution order: LINEAR_API_KEY env var → [auth].command → [auth].api_key_ref.
[auth]
# Option A: a credential helper command. Works with any password manager that
# can print a secret to stdout. Examples:
#   command = ["op", "read", "op://<your-vault>/Linear/api-key"]   # 1Password
#   command = ["pass", "show", "linear/api-key"]                    # pass
#   command = ["bw", "get", "password", "Linear"]                   # Bitwarden
#   command = ["security", "find-generic-password", "-s", "linear", "-w"]  # macOS keychain
# command = ["pass", "show", "linear/api-key"]

# Option B: 1Password sugar — shorthand for command = ["op", "read", "<ref>"].
# api_key_ref = "op://<your-vault>/Linear/api-key"

[defaults]
sort = "priority"
states = ["backlog", "unstarted", "started"]
limit = 50
# Fallback team used when no --team is given and the cwd matches no [context-map]
# entry (e.g. running lql from a non-linked directory). When it kicks in, lql
# prints a warning to stderr announcing the substitution. Leave unset to keep the
# strict "Could not detect team" error instead.
# team = "ENG"

[context-map]
# directorio → team, project, label
"~/code/myproject" = { team = "ENG", project = "MyProject", label = "myproject" }

[state-aliases]
"Todo" = "unstarted"
"In Progress" = "started"
"Done" = "completed"
"Canceled" = "canceled"
"Cancelled" = "canceled"

[priority-aliases]
urgent = 1
high = 2
medium = 3
low = 4
none = 0

[retired-teams]
# OLD = "Use: --team NEW --label old"
